version: 2
updates:
  - package-ecosystem: pip
    directory: "/{{cookiecutter.project_name}}"
    schedule:
      interval: daily
      time: "02:00"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: "/{{cookiecutter.project_name}}/docker/django"
    schedule:
      interval: daily
      time: "02:00"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: daily
      time: "02:00"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
